<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الفوترة الإلكترونية - متوافق مع ZATCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary-green: #1B5E20;
            --secondary-green: #2E7D32;
            --gold: #F9A825;
            --light-gold: #FFF59D;
            --white: #FFFFFF;
            --light-gray: #F5F5F5;
            --border-gray: #E0E0E0;
            --text-dark: #212121;
            --text-gray: #757575;
            --success: #4CAF50;
            --warning: #FF9800;
            --danger: #F44336;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f5e9 100%);
            color: var(--text-dark);
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, var(--primary-green) 0%, var(--secondary-green) 100%);
            padding: 20px;
            box-shadow: -2px 0 20px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 1000;
        }
        .logo {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 30px;
        }
        .logo h1 {
            color: var(--white);
            font-size: 24px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .logo p {
            color: var(--light-gold);
            font-size: 12px;
            margin-top: 5px;
        }
        .menu {
            list-style: none;
        }
        .menu-item {
            margin: 10px 0;
        }
        .menu-item a {
            display: flex;
            align-items: center;
            padding: 15px;
            color: var(--white);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .menu-item a:hover, .menu-item a.active {
            background: rgba(255,255,255,0.2);
            transform: translateX(-5px);
        }
        .menu-item a.active {
            background: var(--gold);
            color: var(--primary-green);
        }
        .menu-icon {
            width: 24px;
            margin-left: 15px;
            font-size: 20px;
        }
        .main-content {
            margin-right: 280px;
            padding: 30px;
        }
        .header {
            background: var(--white);
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 {
            color: var(--primary-green);
            font-size: 28px;
            font-weight: 700;
        }
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            color: var(--text-gray);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-green);
            margin-bottom: 10px;
        }
        .stat-card .trend {
            font-size: 14px;
            color: var(--success);
            font-weight: 600;
        }
        .content-card {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 600;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-gray);
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-green);
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }
        .btn-primary {
            background: var(--primary-green);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--secondary-green);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 94, 32, 0.3);
        }
        .invoice-preview {
            border: 2px solid var(--border-gray);
            border-radius: 15px;
            padding: 40px;
            background: var(--white);
            margin-top: 30px;
        }
        .invoice-header {
            display: flex;
            justify-content: space-between;
            padding-bottom: 30px;
            border-bottom: 3px solid var(--primary-green);
            margin-bottom: 30px;
        }
        .company-info h2 {
            color: var(--primary-green);
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
        }
        .invoice-details {
            text-align: left;
        }
        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
        }
        .invoice-table th {
            background: var(--primary-green);
            color: var(--white);
            padding: 15px;
            text-align: right;
            font-weight: 700;
        }
        .invoice-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border-gray);
        }
        .invoice-total {
            text-align: left;
            margin-top: 30px;
        }
        .invoice-total table {
            margin-right: auto;
            width: 300px;
        }
        .invoice-total td {
            padding: 10px;
            font-weight: 600;
        }
        .qr-code {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: var(--light-gray);
            border-radius: 10px;
        }
        @media print {
            .sidebar, .header, .btn {
                display: none;
            }
            .main-content {
                margin-right: 0;
            }
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .main-content {
                margin-right: 0;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .stats-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
